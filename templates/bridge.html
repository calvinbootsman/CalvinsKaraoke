<script>
const commandPayload = __COMMAND_JSON__;
const popupName = "calvins-karaoke-player";
const playerUrl = __PLAYER_URL_JSON__;
const playerOrigin = new URL(playerUrl).origin;

function buildPlayerUrlWithCommand(payload) {
    if (!payload || !payload.id) return playerUrl;
    try {
        return `${playerUrl}#cmdid=${Number(payload.id || 0)}`;
    } catch (error) {
        return playerUrl;
    }
}

function ensurePopup(payload = null) {
    const openUrl = payload ? buildPlayerUrlWithCommand(payload) : playerUrl;
    const popup = window.open(openUrl, popupName, 'popup,width=980,height=760');
    if (!popup) return null;
    return popup;
}

function hasActivePlayerHeartbeat() {
    try {
        const raw = localStorage.getItem('karaoke-player-heartbeat');
        const lastBeat = Number(raw || 0);
        return (Date.now() - lastBeat) < 5000;
    } catch (error) {
        return false;
    }
}

function dispatchToPopup(popup, payload, attempt = 0) {
    if (!popup || popup.closed) return;

    try {
        popup.postMessage({ type: 'karaoke-command', payload }, playerOrigin);
    } catch (error) {
    }

    try {
        if (typeof popup.__karaokeReceiveCommand === 'function') {
            popup.__karaokeReceiveCommand(payload);
            return;
        }
    } catch (error) {
        return;
    }

    if (attempt < 40) {
        setTimeout(() => dispatchToPopup(popup, payload, attempt + 1), 50);
    }
}

function getLastConsumedCommandId() {
    try {
        return Number(localStorage.getItem('karaoke-last-consumed-command-id') || 0);
    } catch (error) {
        return 0;
    }
}

function forceOpenAndDispatch(payload) {
    const popup = ensurePopup(payload);
    if (!popup) return;
    publishCommand(payload);
    dispatchToPopup(popup, payload);
    popup.focus();
}

function publishCommand(payload) {
    try {
        const channel = new BroadcastChannel('karaoke-player-commands');
        channel.postMessage(payload);
        channel.close();
    } catch (error) {
    }
}

function ensureCommandDelivery(payload, shouldOpen) {
    publishCommand(payload);

    const popup = shouldOpen ? ensurePopup(payload) : ensurePopup();
    if (popup) {
        dispatchToPopup(popup, payload);
        if (shouldOpen) {
            popup.focus();
        }
    }

    setTimeout(() => {
        publishCommand(payload);
    }, 250);

    setTimeout(() => {
        publishCommand(payload);
    }, 900);

    setTimeout(() => {
        const consumedId = getLastConsumedCommandId();
        if (consumedId >= Number(payload.id || 0)) return;
        if (shouldOpen) {
            forceOpenAndDispatch(payload);
        }
    }, 300);

    setTimeout(() => {
        const consumedId = getLastConsumedCommandId();
        if (consumedId >= Number(payload.id || 0)) return;
        if (shouldOpen) {
            forceOpenAndDispatch(payload);
        }
    }, 1200);
}

if (commandPayload && commandPayload.id) {
    try {
        localStorage.setItem('karaoke-command', JSON.stringify(commandPayload));
    } catch (error) {
    }

    const shouldOpen = !!commandPayload.openWindow || ['load_and_play', 'play', 'pause', 'stop'].includes(commandPayload.command);
    const needsOpen = shouldOpen && !hasActivePlayerHeartbeat();
    if (needsOpen) {
        forceOpenAndDispatch(commandPayload);
    }

    ensureCommandDelivery(commandPayload, shouldOpen);
}
</script>
