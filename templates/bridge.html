<script>
const commandPayload = __COMMAND_JSON__;
const popupName = "calvins-karaoke-player";
const playerUrl = __PLAYER_URL_JSON__;
const playerOrigin = new URL(playerUrl).origin;
const bridgeSeqStorageKey = 'karaoke-bridge-command-seq';
let bridgeCommandSeq = 0;
let latestSongPayload = (commandPayload && commandPayload.song) ? commandPayload.song : null;
let popupRef = null;

try {
    const persistedSeq = Number(localStorage.getItem(bridgeSeqStorageKey) || 0);
    bridgeCommandSeq = Math.max(bridgeCommandSeq, persistedSeq);
} catch (error) {
}

bridgeCommandSeq = Math.max(bridgeCommandSeq, Number(commandPayload && commandPayload.id ? commandPayload.id : 0));

function buildPlayerUrlWithCommand(payload) {
    if (!payload || !payload.id) return playerUrl;
    try {
        return `${playerUrl}#cmdid=${Number(payload.id || 0)}`;
    } catch (error) {
        return playerUrl;
    }
}

function ensurePopup(payload = null) {
    const openUrl = payload ? buildPlayerUrlWithCommand(payload) : playerUrl;
    const popup = window.open(openUrl, popupName, 'popup,width=980,height=760');
    if (!popup) return null;
    popupRef = popup;
    return popup;
}

function getActivePopup() {
    if (!popupRef || popupRef.closed) return null;
    return popupRef;
}

function hasActivePlayerHeartbeat() {
    try {
        const raw = localStorage.getItem('karaoke-player-heartbeat');
        const lastBeat = Number(raw || 0);
        return (Date.now() - lastBeat) < 5000;
    } catch (error) {
        return false;
    }
}

function dispatchToPopup(popup, payload, attempt = 0) {
    if (!popup || popup.closed) return;

    try {
        popup.postMessage({ type: 'karaoke-command', payload }, playerOrigin);
    } catch (error) {
    }

    try {
        if (typeof popup.__karaokeReceiveCommand === 'function') {
            popup.__karaokeReceiveCommand(payload);
            return;
        }
    } catch (error) {
        return;
    }

    if (attempt < 40) {
        setTimeout(() => dispatchToPopup(popup, payload, attempt + 1), 50);
    }
}

function getLastConsumedCommandId() {
    try {
        return Number(localStorage.getItem('karaoke-last-consumed-command-id') || 0);
    } catch (error) {
        return 0;
    }
}

function forceOpenAndDispatch(payload) {
    const popup = ensurePopup(payload);
    if (!popup) return;
    publishCommand(payload);
    dispatchToPopup(popup, payload);
    popup.focus();
}

function publishCommand(payload) {
    try {
        const channel = new BroadcastChannel('karaoke-player-commands');
        channel.postMessage(payload);
        channel.close();
    } catch (error) {
    }
}

function allocateBridgeCommandId() {
    bridgeCommandSeq = Math.max(bridgeCommandSeq, getLastConsumedCommandId());
    bridgeCommandSeq += 1;
    try {
        localStorage.setItem(bridgeSeqStorageKey, String(bridgeCommandSeq));
    } catch (error) {
    }
    return bridgeCommandSeq;
}

function normalizeOutboundPayload(payload) {
    if (!payload || typeof payload !== 'object') return payload;
    return {
        ...payload,
        id: allocateBridgeCommandId(),
    };
}

function ensureCommandDelivery(payload, shouldOpen) {
    const normalizedPayload = normalizeOutboundPayload(payload);
    if (!normalizedPayload) return;

    if (normalizedPayload.song) {
        latestSongPayload = normalizedPayload.song;
    }

    if (normalizedPayload.command === 'sync') {
        publishCommand(normalizedPayload);
        const activePopup = getActivePopup();
        if (activePopup) {
            dispatchToPopup(activePopup, normalizedPayload);
        }
        return;
    }

    publishCommand(normalizedPayload);

    const popup = shouldOpen ? ensurePopup(normalizedPayload) : getActivePopup();
    if (popup) {
        dispatchToPopup(popup, normalizedPayload);
        if (shouldOpen) {
            popup.focus();
        }
    }

    setTimeout(() => {
        publishCommand(normalizedPayload);
    }, 250);

    setTimeout(() => {
        publishCommand(normalizedPayload);
    }, 900);

    setTimeout(() => {
        const consumedId = getLastConsumedCommandId();
        if (consumedId >= Number(normalizedPayload.id || 0)) return;
        if (shouldOpen) {
            forceOpenAndDispatch(normalizedPayload);
        }
    }, 300);

    setTimeout(() => {
        const consumedId = getLastConsumedCommandId();
        if (consumedId >= Number(normalizedPayload.id || 0)) return;
        if (shouldOpen) {
            forceOpenAndDispatch(normalizedPayload);
        }
    }, 1200);
}

function buildBridgeForwardPayload(mainPayload) {
    if (!mainPayload || !mainPayload.command) return null;
    return {
        command: mainPayload.command,
        song: mainPayload.song || latestSongPayload,
        openWindow: false,
        currentTime: Math.max(0, Number(mainPayload.currentTime || 0)),
        isPlaying: !!mainPayload.isPlaying,
    };
}

window.addEventListener('message', (event) => {
    try {
        if (!event || !event.data || event.data.type !== 'karaoke-main-command') return;
        const forwarded = buildBridgeForwardPayload(event.data.payload);
        if (!forwarded) return;
        ensureCommandDelivery(forwarded, false);
    } catch (error) {
    }
});

if (commandPayload && commandPayload.id) {
    try {
        localStorage.setItem('karaoke-command', JSON.stringify(commandPayload));
    } catch (error) {
    }

    const shouldOpen = !!commandPayload.openWindow || ['load_and_play', 'play', 'pause', 'stop'].includes(commandPayload.command);
    const needsOpen = shouldOpen && !hasActivePlayerHeartbeat();
    if (needsOpen) {
        forceOpenAndDispatch(commandPayload);
    }

    ensureCommandDelivery(commandPayload, shouldOpen);
}
</script>
