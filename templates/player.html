<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Calvin's Karaoke Player</title>
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937 45%, #0f172a);
            color: #f9fafb;
            min-height: 100vh;
            padding: 22px;
            box-sizing: border-box;
        }
        .panel {
            max-width: 860px;
            margin: 0 auto;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.8);
            padding: 18px;
        }
        h1 { margin: 0 0 8px 0; font-size: 1.35rem; }
        #songTitle { color: #cbd5e1; margin: 0 0 14px 0; }
        #statusRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.94rem;
            color: #cbd5e1;
        }
        #playbackState {
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .state-playing {
            background: #14532d;
            color: #dcfce7;
        }
        .state-paused {
            background: #7f1d1d;
            color: #fee2e2;
        }
        #debug {
            margin-top: 14px;
            border: 1px solid rgba(100, 116, 139, 0.5);
            border-radius: 10px;
            background: rgba(2, 6, 23, 0.7);
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 0.84rem;
            white-space: pre-wrap;
            color: #cbd5e1;
            min-height: 130px;
        }
        #pitchCanvas {
            width: 100%;
            height: 240px;
            background: rgba(2, 6, 23, 0.7);
            border-radius: 10px;
            margin-top: 14px;
            border: 1px solid rgba(100, 116, 139, 0.5);
        }
        #lyrics {
            margin-top: 20px;
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid rgba(100, 116, 139, 0.5);
            border-radius: 10px;
            padding: 16px;
            line-height: 1.6;
            background: rgba(2, 6, 23, 0.7);
            font-size: 48pt;
        }
        .line {
            opacity: 0.45;
            transition: all 0.2s ease;
            margin: 2px 0;
            font-size: 2.06rem;
        }
        .line.active {
            opacity: 1;
            color: #fde68a;
            transform: translateX(4px);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Now Singing</h1>
        <p id="songTitle">No song loaded.</p>
        <div id="statusRow">
            <span id="timeLabel">00:00</span>
            <span id="playbackState" class="state-paused">Paused</span>
        </div>
        <div id="debug" style="display: none;"></div>
        <canvas id="pitchCanvas"></canvas>
        <div id="lyrics"></div>
    </div>
    <script>
        __SHARED_LYRICS_JS__

        const titleEl = document.getElementById('songTitle');
        const lyricsEl = document.getElementById('lyrics');
        const debugEl = document.getElementById('debug');
        const timeLabelEl = document.getElementById('timeLabel');
        const playbackStateEl = document.getElementById('playbackState');
        let lyricRows = [];
        let currentConfidenceThreshold = 0.5;
        let currentSongTitle = null;
        const lyricWindow = window.createKaraokeLyricWindow({
            lyricsEl,
            visibleLines: 6,
            lineClassName: 'line',
            activeClassName: 'active',
            emptyMessage: 'No synced lyrics found for this song.',
            smoothScroll: true,
        });
        let lastCommandId = 0;
        let heartbeatTimer = null;
        let lyricTicker = null;
        let debugLines = [];
        const pitchCanvas = document.getElementById('pitchCanvas');
        const pitchCtx = pitchCanvas.getContext('2d');
        let pitchData = [];
        const MIC_RMS_THRESHOLD = 0.005;
        const MIN_PITCH_HZ = 65;
        const MAX_PITCH_HZ = 1100;
        const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const micState = {
            initialized: false,
            active: false,
            volumeRms: 0,
            frequencyHz: 0,
            note: '',
            stream: null,
            audioContext: null,
            analyser: null,
            rafId: null,
        };

        function frequencyToNote(frequencyHz) {
            const freq = Number(frequencyHz || 0);
            if (!Number.isFinite(freq) || freq <= 0) return '';
            const midi = Math.round(69 + 12 * Math.log2(freq / 440));
            const octave = Math.floor(midi / 12) - 1;
            const noteName = NOTE_NAMES[((midi % 12) + 12) % 12];
            return `${noteName}${octave}`;
        }

        function autoCorrelatePitch(buffer, sampleRate) {
            const length = buffer.length;
            if (!length) return 0;

            let rms = 0;
            for (let i = 0; i < length; i += 1) {
                const value = buffer[i];
                rms += value * value;
            }
            rms = Math.sqrt(rms / length);
            if (rms < MIC_RMS_THRESHOLD) {
                return 0;
            }

            let bestOffset = -1;
            let bestCorrelation = 0;
            const maxSamples = Math.floor(length / 2);
            for (let offset = 8; offset < maxSamples; offset += 1) {
                let correlation = 0;
                for (let i = 0; i < maxSamples; i += 1) {
                    correlation += Math.abs(buffer[i] - buffer[i + offset]);
                }
                correlation = 1 - (correlation / maxSamples);
                if (correlation > bestCorrelation) {
                    bestCorrelation = correlation;
                    bestOffset = offset;
                }
            }

            if (bestOffset <= 0 || bestCorrelation < 0.88) {
                return 0;
            }

            const frequency = sampleRate / bestOffset;
            if (frequency < MIN_PITCH_HZ || frequency > MAX_PITCH_HZ) {
                return 0;
            }
            return frequency;
        }

        async function initMicrophonePitchTracking() {
            if (micState.initialized) return;
            micState.initialized = true;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                writeDebug('micUnsupported');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                    }
                });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                micState.active = true;
                micState.stream = stream;
                micState.audioContext = audioContext;
                micState.analyser = analyser;

                const timeDomain = new Float32Array(analyser.fftSize);

                const tickMic = () => {
                    if (!micState.active || !micState.analyser) return;
                    micState.analyser.getFloatTimeDomainData(timeDomain);

                    let rms = 0;
                    for (let i = 0; i < timeDomain.length; i += 1) {
                        const sample = timeDomain[i];
                        rms += sample * sample;
                    }
                    rms = Math.sqrt(rms / timeDomain.length);
                    micState.volumeRms = rms;

                    const frequencyHz = autoCorrelatePitch(timeDomain, audioContext.sampleRate);
                    if (frequencyHz > 0 && rms >= MIC_RMS_THRESHOLD) {
                        micState.frequencyHz = frequencyHz;
                        micState.note = frequencyToNote(frequencyHz);
                    } else {
                        micState.frequencyHz = 0;
                        micState.note = '';
                    }

                    micState.rafId = window.requestAnimationFrame(tickMic);
                };

                tickMic();
                writeDebug('micReady');
            } catch (error) {
                writeDebug('micInitFailed', { message: String(error) });
            }
        }

        function resizePitchCanvas() {
            const containerWidth = pitchCanvas.parentElement.clientWidth - 36;
            pitchCanvas.width = containerWidth;
            pitchCanvas.height = 240;
        }

        function drawPitch(currentTime) {
            if (!pitchData.length) return;
            resizePitchCanvas();
            const ctx = pitchCtx;
            const width = pitchCanvas.width;
            const height = pitchCanvas.height;

            const offset = 50; // X offset for timeline

            ctx.fillStyle = 'rgba(2, 6, 23, 0.7)';
            ctx.fillRect(0, 0, width, height);

            const viewStart = currentTime;
            const viewEnd = currentTime + 10;
            const pointsInView = pitchData.filter(d => d.time >= viewStart && d.time <= viewEnd);
            if (pointsInView.length < 2) return;

            const timeToX = (t) => offset + ((t - viewStart) / 10) * (width - offset);
            const freqToY = (freq) => {
                if (freq <= 0) return height;
                const midi = 12 * (Math.log2(freq / 440)) + 69;
                const normalized = Math.max(0, Math.min(1, (midi - 40) / 60));
                return height - (normalized * height) - 10;
            };

            ctx.strokeStyle = 'rgba(100, 116, 139, 0.3)';
            ctx.lineWidth = 1;

            const noteInfo = [
                { midi: 40, name: 'E2' }, { midi: 43, name: 'G2' }, { midi: 46, name: 'A#2' },
                { midi: 48, name: 'C3' }, { midi: 50, name: 'D3' }, { midi: 53, name: 'F3' },
                { midi: 55, name: 'G3' }, { midi: 58, name: 'A#3' }, { midi: 60, name: 'C4' },
                { midi: 62, name: 'D4' }, { midi: 65, name: 'F4' }, { midi: 67, name: 'G4' },
                { midi: 70, name: 'A#4' }, { midi: 72, name: 'C5' }, { midi: 75, name: 'D5' },
                { midi: 79, name: 'F5' }, { midi: 83, name: 'G5' }
            ];
            const halfTheNotes = noteInfo.length / 2;
            const everyOtherNote = noteInfo.filter((_, i) => i % 2 === 0);
            for (const n of everyOtherNote) {
                const freq = 440 * Math.pow(2, (n.midi - 69) / 12);
                const y = freqToY(freq);
                ctx.beginPath();
                ctx.moveTo(10, y);
                ctx.lineTo(width, y);
                ctx.stroke();
                ctx.fillStyle = 'rgba(148, 163, 184, 0.7)';
                ctx.font = '10px Segoe UI, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(n.name, 8, y);
            }

            for (let sec = 0; sec <= 10; sec += 2) {
                const x = timeToX(viewStart + sec);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            ctx.strokeStyle = '#fde68a';
            ctx.lineWidth = 2;
            let inSegment = false;
            for (let i = 0; i < pointsInView.length; i++) {
                const d = pointsInView[i];
                const x = timeToX(d.time);
                const y = freqToY(d.frequency);
                const isVoiced = d.frequency > 0 && d.confidence >= currentConfidenceThreshold;
                if (isVoiced) {
                    if (!inSegment) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        inSegment = true;
                    } else {
                        ctx.lineTo(x, y);
                    }
                } else {
                    if (inSegment) {
                        ctx.stroke();
                        inSegment = false;
                    }
                }
            }
            if (inSegment) ctx.stroke();

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(offset, 0);
            ctx.lineTo(offset, height);
            ctx.stroke();

            const micVisible = micState.active && micState.volumeRms >= MIC_RMS_THRESHOLD && micState.frequencyHz > 0;
            if (micVisible) {
                const micY = freqToY(micState.frequencyHz);
                ctx.fillStyle = '#f8fafc';
                ctx.beginPath();
                ctx.arc(offset, micY, 4, 0, Math.PI * 2);
                ctx.fill();

                if (micState.note) {
                    ctx.fillStyle = '#fca5a5';
                    ctx.font = '11px Segoe UI, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(micState.note, offset + 8, micY);
                }
            }
        }

        async function loadPitchData(pitchUrl) {
            if (!pitchUrl) {
                pitchData = [];
                return;
            }
            try {
                const response = await fetch(pitchUrl, { cache: 'no-store' });
                if (!response.ok) return;
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                pitchData = lines.slice(1).map(line => {
                    const [timeStr, freqStr, confStr] = line.split(',');
                    return {
                        time: parseFloat(timeStr) || 0,
                        frequency: parseFloat(freqStr) || 0,
                        confidence: parseFloat(confStr) || 0
                    };
                }).filter(d => !isNaN(d.time));
            } catch (error) {
                pitchData = [];
            }
        }


        const DEBUG_ENABLED = __DEBUG_ENABLED__;
        debugEl.style.display = DEBUG_ENABLED ? 'block' : 'none';
        let commandChannel = null;
        const commandFeedPath = '/_karaoke_command.json';
        const playbackStateKey = 'karaoke-main-player-state';
        let timelineTime = 0;
        let timelineIsPlaying = false;
        let timelineStartedAt = null;

        function formatTime(seconds) {
            const clamped = Math.max(0, Math.floor(Number(seconds || 0)));
            const minutes = Math.floor(clamped / 60);
            const secs = clamped % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function getTimelineTime() {
            if (!timelineIsPlaying || timelineStartedAt === null) {
                return Math.max(0, timelineTime);
            }
            return Math.max(0, (Date.now() - timelineStartedAt) / 1000);
        }

        function updatePlaybackBadge() {
            if (timelineIsPlaying) {
                playbackStateEl.textContent = 'Playing';
                playbackStateEl.classList.add('state-playing');
                playbackStateEl.classList.remove('state-paused');
                return;
            }

            playbackStateEl.textContent = 'Paused';
            playbackStateEl.classList.add('state-paused');
            playbackStateEl.classList.remove('state-playing');
        }

        function setTimeline(timeSeconds, playing) {
            timelineTime = Math.max(0, Number(timeSeconds || 0));
            timelineIsPlaying = !!playing;
            timelineStartedAt = timelineIsPlaying ? (Date.now() - timelineTime * 1000) : null;
            timeLabelEl.textContent = formatTime(timelineTime);
            updatePlaybackBadge();
        }

        function tickLyrics() {
            const currentTime = getTimelineTime();
            timelineTime = currentTime;
            timeLabelEl.textContent = formatTime(currentTime);
            lyricWindow.highlight(currentTime);
            drawPitch(currentTime);
        }

        function writeDebug(message, meta = null) {
            if (!DEBUG_ENABLED) return;
            const stamp = new Date().toLocaleTimeString();
            let line = `${stamp} | ${message}`;
            if (meta !== null) {
                try {
                    line += ` | ${JSON.stringify(meta)}`;
                } catch (error) {
                    line += ' | <meta-json-error>';
                }
            }
            debugLines = [...debugLines, line].slice(-14);
            const now = {
                currentTime: Number(getTimelineTime()).toFixed(2),
                isPlaying: timelineIsPlaying,
                lastCommandId,
            };
            debugEl.textContent = `Debug\n${debugLines.join('\n')}\n\nPlaybackState: ${JSON.stringify(now)}`;
        }

        function applySong(song) {
            if (!song) return;
            titleEl.textContent = song.title || 'Unknown song';
            currentSongTitle = song.title || null;
            lyricRows = Array.isArray(song.lyrics) ? song.lyrics : [];
            lyricWindow.setRows(lyricRows);
            if (song.pitchUrl) loadPitchData(song.pitchUrl);
            else pitchData = [];
            writeDebug('applySong', {
                title: song.title || null,
                lyricCount: lyricRows.length,
                hasPitch: !!song.pitchUrl
            });
        }

        function handleCommand(payload) {
            console.log('Handling command', payload);
            if (!payload || !payload.command) return;
            writeDebug('handleCommand', { id: payload.id, command: payload.command, song: payload.song?.title || null });

            if (payload.confidenceThreshold !== undefined) {
                currentConfidenceThreshold = Number(payload.confidenceThreshold);
            }

            if (payload.command === 'load_and_play') {
                applySong(payload.song);
                setTimeline(payload.currentTime ?? 0, true);
                return;
            }

            if (payload.command === 'play') {
                applySong(payload.song);
                const fallbackNow = getTimelineTime();
                let targetTime = payload.currentTime ?? fallbackNow;
                // Backend play timestamps can be stale after user scrubbing.
                // For backend-origin play packets, keep the already synced timeline
                // when the incoming timestamp differs noticeably.
                if (typeof payload.isPlaying !== 'boolean') {
                    const drift = Math.abs(Number(targetTime || 0) - Number(fallbackNow || 0));
                    if (drift > 0.35) {
                        targetTime = fallbackNow;
                    }
                }
                setTimeline(targetTime, true);
                return;
            }

            if (payload.command === 'pause') {
                applySong(payload.song);
                const fallbackNow = getTimelineTime();
                let targetTime = payload.currentTime ?? fallbackNow;
                // Backend pause timestamps can lag slightly behind live synced time.
                // If this is a backend-origin pause packet (no explicit isPlaying flag),
                // keep the currently synced timeline when the difference is noticeable.
                if (typeof payload.isPlaying !== 'boolean') {
                    const drift = Math.abs(Number(targetTime || 0) - Number(fallbackNow || 0));
                    if (drift > 0.35) {
                        targetTime = fallbackNow;
                    }
                }
                setTimeline(targetTime, false);
                return;
            }

            if (payload.command === 'seek') {
                applySong(payload.song);
                const nextPlaying = typeof payload.isPlaying === 'boolean' ? payload.isPlaying : timelineIsPlaying;
                setTimeline(payload.currentTime ?? getTimelineTime(), nextPlaying);
                return;
            }

            if (payload.command === 'sync') {
                const nextPlaying = typeof payload.isPlaying === 'boolean' ? payload.isPlaying : timelineIsPlaying;
                const targetTime = payload.currentTime ?? getTimelineTime();
                const drift = Math.abs(getTimelineTime() - Number(targetTime || 0));
                // If drift > 0.35s, it smoothly jumps to correct itself. 
                if (drift > 0.35 || nextPlaying !== timelineIsPlaying) {
                    setTimeline(targetTime, nextPlaying);
                }
                return;
            }

            if (payload.command === 'stop') {
                applySong(payload.song);
                setTimeline(0, false);
                return;
            }

            if (payload.command === 'open_window') {
                applySong(payload.song);
                setTimeline(payload.currentTime ?? 0, false);
                return;
            }
        }

        function syncFromMainPlaybackState(force = false) {
            try {
                const raw = localStorage.getItem(playbackStateKey);
                if (!raw) return;
                const parsed = JSON.parse(raw);
                if (!parsed || !parsed.songTitle || !Number.isFinite(Number(parsed.currentTime))) return;
                if (currentSongTitle && parsed.songTitle !== currentSongTitle) return;

                if (parsed.confidenceThreshold !== undefined) {
                    currentConfidenceThreshold = Number(parsed.confidenceThreshold);
                }

                const targetTime = Math.max(0, Number(parsed.currentTime || 0));
                const targetPlaying = !!parsed.isPlaying;
                const localTime = getTimelineTime();
                const drift = Math.abs(localTime - targetTime);
                const playingChanged = targetPlaying !== timelineIsPlaying;

                if (force || drift > 0.35 || playingChanged) {
                    setTimeline(targetTime, targetPlaying);
                }
            } catch (error) {
                writeDebug('syncMainPlaybackStateError', { message: String(error) });
            }
        }

        function maybeHandleCommand(payload) {
            if (!payload || !payload.id) return;
            if (payload.id <= lastCommandId) {
                writeDebug('dropCommandDuplicate', { id: payload.id, lastCommandId });
                return;
            }
            writeDebug('acceptCommand', { id: payload.id, command: payload.command });
            lastCommandId = payload.id;
            handleCommand(payload);
            try {
                localStorage.setItem('karaoke-last-consumed-command-id', String(payload.id));
            } catch (error) {
                writeDebug('ackWriteError', { message: String(error) });
            }
        }

        function consumePersistedCommand() {
            try {
                const raw = localStorage.getItem('karaoke-command');
                if (!raw) return;
                writeDebug('consumePersistedCommand');
                maybeHandleCommand(JSON.parse(raw));
            } catch (error) {
                writeDebug('consumePersistedCommandError', { message: String(error) });
            }
        }

        async function fetchLatestCommand(minId = 0) {
            try {
                const response = await fetch(`${commandFeedPath}?cb=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) {
                    writeDebug('fetchLatestCommandHttpError', { status: response.status });
                    return;
                }

                const payload = await response.json();
                const payloadId = Number(payload?.id || 0);
                if (!payloadId) return;
                if (payloadId < Number(minId || 0)) {
                    writeDebug('fetchLatestCommandTooOld', { payloadId, minId });
                    return;
                }
                writeDebug('fetchLatestCommandApply', { payloadId });
                maybeHandleCommand(payload);
            } catch (error) {
                writeDebug('fetchLatestCommandError', { message: String(error) });
            }
        }

        function consumeCommandFromLocationHash() {
            try {
                const rawHash = window.location.hash || '';
                if (rawHash.startsWith('#cmdid=')) {
                    const minId = Number(rawHash.slice(7) || 0);
                    writeDebug('consumeHashCommandId', { minId });
                    fetchLatestCommand(minId);
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                    return;
                }
                if (!rawHash.startsWith('#cmd=')) return;
                const encoded = rawHash.slice(5);
                if (!encoded) return;
                writeDebug('consumeHashCommand');
                maybeHandleCommand(JSON.parse(decodeURIComponent(encoded)));
                history.replaceState(null, '', window.location.pathname + window.location.search);
            } catch (error) {
                writeDebug('consumeHashCommandError', { message: String(error) });
            }
        }

        window.__karaokeReceiveCommand = maybeHandleCommand;

        try {
            commandChannel = new BroadcastChannel('karaoke-player-commands');
            commandChannel.onmessage = (event) => {
                writeDebug('broadcastCommandEvent');
                maybeHandleCommand(event.data);
            };
        } catch (error) {
            writeDebug('broadcastInitError', { message: String(error) });
        }

        function updateHeartbeat() {
            try {
                localStorage.setItem('karaoke-player-heartbeat', String(Date.now()));
            } catch (error) {
            }
        }

        updateHeartbeat();
        heartbeatTimer = setInterval(updateHeartbeat, 1500);
        initMicrophonePitchTracking();

        window.addEventListener('storage', (event) => {
            if (event.key === playbackStateKey && event.newValue) {
                syncFromMainPlaybackState(true);
                return;
            }
            if (event.key !== 'karaoke-command' || !event.newValue) return;
            try {
                writeDebug('storageCommandEvent');
                maybeHandleCommand(JSON.parse(event.newValue));
            } catch (error) {
                writeDebug('storageCommandEventError', { message: String(error) });
            }
        });

        window.addEventListener('message', (event) => {
            try {
                if (!event || !event.data || event.data.type !== 'karaoke-command') return;
                writeDebug('postMessageCommandEvent');
                maybeHandleCommand(event.data.payload);
            } catch (error) {
                writeDebug('postMessageCommandEventError', { message: String(error) });
            }
        });

        window.addEventListener('beforeunload', () => {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
            }
            if (lyricTicker) {
                clearInterval(lyricTicker);
            }
            if (commandChannel) {
                commandChannel.close();
            }
            if (micState.rafId) {
                cancelAnimationFrame(micState.rafId);
            }
            if (micState.stream) {
                micState.stream.getTracks().forEach((track) => track.stop());
            }
            if (micState.audioContext) {
                micState.audioContext.close();
            }
        });

        consumeCommandFromLocationHash();
        fetchLatestCommand(lastCommandId + 1);
        setTimeout(() => fetchLatestCommand(lastCommandId + 1), 500);
        consumePersistedCommand();
        setInterval(() => syncFromMainPlaybackState(false), 250);
        window.addEventListener('resize', () => { resizePitchCanvas(); drawPitch(getTimelineTime()); });
        lyricTicker = setInterval(tickLyrics, 150);
        writeDebug('playerReady');
    </script>
</body>
</html>
